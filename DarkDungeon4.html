<!DOCTYPE html>
<html>
<head>
<title>Dungeon Crawler</title>
<style>
body{margin:0;background:#111;color:white;font-family:sans-serif;text-align:center}
canvas{background:#222;margin-top:10px;border:4px solid #555}
</style>
</head>
<body>
<h2>Dungeon Crawler</h2>
<p>Move: WASD | Attack: walk into enemy | Fireball: F | Stairs: E</p>
<canvas id="game" width="640" height="640"></canvas>
<script>
const canvas=document.getElementById('game');
const ctx=canvas.getContext('2d');

const TILE=32;
const SIZE=20;

let floor=1;

function rand(min,max){return Math.floor(Math.random()*(max-min))+min}

function generateFloor(){
 let map=[];
 for(let y=0;y<SIZE;y++){
  let row=[];
  for(let x=0;x<SIZE;x++){
   if(Math.random()<0.1||x===0||y===0||x===SIZE-1||y===SIZE-1)row.push(1);
   else row.push(0);
  }
  map.push(row);
 }
 map[rand(2,18)][rand(2,18)]=2;
 return map;
}

let map=generateFloor();

let player={x:1,y:1,hp:100,gold:0};

let enemies=[];

function spawnEnemies(){
 enemies=[];
 for(let i=0;i<5+floor;i++){
  enemies.push({
   x:rand(2,18),
   y:rand(2,18),
   hp:20+floor*5
  });
 }
}

spawnEnemies();

function drawTile(x,y,type){
 if(type===1){
  ctx.fillStyle="#444";
  ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
 }
 else if(type===0){
  ctx.fillStyle="#2b2b2b";
  ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
 }
 else if(type===2){
  ctx.fillStyle="#ffd700";
  ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
 }
}

function drawPlayer(){
 ctx.fillStyle="#4aa3ff";
 ctx.fillRect(player.x*TILE+6,player.y*TILE+6,20,20);
}

function drawEnemies(){
 ctx.fillStyle="#ff5555";
 enemies.forEach(e=>{
  ctx.fillRect(e.x*TILE+6,e.y*TILE+6,20,20);
 });
}

function draw(){
 ctx.clearRect(0,0,canvas.width,canvas.height);

 for(let y=0;y<SIZE;y++){
  for(let x=0;x<SIZE;x++){
   drawTile(x,y,map[y][x]);
  }
 }

 drawEnemies();
 drawPlayer();

 ctx.fillStyle="white";
 ctx.fillText("HP: "+player.hp+"  Gold: "+player.gold+"  Floor: "+floor,10,15);
}

function move(dx,dy){
 let nx=player.x+dx;
 let ny=player.y+dy;

 if(map[ny][nx]===1)return;

 let enemy=enemies.find(e=>e.x===nx&&e.y===ny);
 if(enemy){
  enemy.hp-=10;
  if(enemy.hp<=0){
   enemies=enemies.filter(e=>e!==enemy);
   player.gold+=5;
  }
  return;
 }

 player.x=nx;
 player.y=ny;
}

function fireball(){
 enemies.forEach(e=>{
  if(Math.abs(e.x-player.x)<=2 && Math.abs(e.y-player.y)<=2){
   e.hp-=15;
  }
 });
 enemies=enemies.filter(e=>e.hp>0);
}

function stairs(){
 if(map[player.y][player.x]===2){
  floor++;
  map=generateFloor();
  player.x=1;
  player.y=1;
  spawnEnemies();
 }
}

window.addEventListener("keydown",e=>{
 if(e.key==="w")move(0,-1);
 if(e.key==="s")move(0,1);
 if(e.key==="a")move(-1,0);
 if(e.key==="d")move(1,0);
 if(e.key==="f")fireball();
 if(e.key==="e")stairs();
 draw();
});

function enemyTurn(){
 enemies.forEach(e=>{
  let dx=Math.sign(player.x-e.x);
  let dy=Math.sign(player.y-e.y);

  if(Math.abs(player.x-e.x)<=1 && Math.abs(player.y-e.y)<=1){
   player.hp-=5;
  }
  else{
   if(map[e.y+dy] && map[e.y+dy][e.x+dx]===0){
    e.x+=dx;
    e.y+=dy;
   }
  }
 });

 if(player.hp<=0){
  alert("Game Over. Reload to play again.");
 }
}

setInterval(()=>{
 enemyTurn();
 draw();
},700);


draw();
</script>
</body>
</html>
